name: gemstone_management
description: Professional Gemstone Trading and Processing Management Mobile Application - Offline First

publish_to: 'none'

version: 1.2.1+74

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.2.0

  # Local Storage & Database (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.0.0

  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3

  # Photo & File Management
  image_picker: ^1.0.0
  path_provider: ^2.1.0
  uuid: ^4.0.0

  # PDF & Export
  pdf: ^3.10.0
  printing: ^5.11.0
  share_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
    - family: Padauk
      fonts:
        - asset: assets/fonts/Padauk-Regular.ttf
        - asset: assets/fonts/Padauk-Bold.ttf
          weight: 700
