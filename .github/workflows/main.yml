name: Build Flutter APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter (Perfect Version Match)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'

      - name: Hard Fix V2 Embedding & Global SDK Override
        working-directory: ./frontend
        run: |
          flutter config --no-analytics
          
          # V2 Embedding အမှားအတွက် အခြေခံဖိုင်များကို ပြုပြင်ခြင်း
          flutter create . --platforms=android --overwrite
          
          # SDK 35 အမှားအား နှိမ်နင်းရန် Gradle properties ထည့်သွင်းခြင်း
          mkdir -p ~/.gradle
          echo "android.lifecycle.compileSdkVersion=34" >> ~/.gradle/gradle.properties
          echo "android.useAndroidX=true" >> ~/.gradle/gradle.properties
          
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties

      - name: Get Flutter dependencies
        working-directory: ./frontend
        run: |
          flutter pub get

      - name: Generate Code and Build APK
        working-directory: ./frontend
        run: |
          echo "Starting Flutter build process..."
          flutter pub run build_runner build --delete-conflicting-outputs || true
          echo "Building APK..."
          flutter build apk --release
          echo "Build completed. Checking APK location..."
          find . -name "*.apk" -type f || echo "No APK found"
          ls -la build/app/outputs/flutter-apk/ || echo "flutter-apk directory not found"
          ls -la build/app/outputs/apk/release/ || echo "apk/release directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-apk
          path: |
            frontend/build/app/outputs/flutter-apk/app-release.apk
            frontend/build/app/outputs/apk/release/app-release.apk
          if-no-files-found: warn
