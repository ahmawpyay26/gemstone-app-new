name: PAT - Production Acceptance Testing

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*-pat']

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    name: Build Release APK
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      
      - name: Create local.properties
        run: |
          echo "sdk.dir=/opt/android-sdk" > android/local.properties
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Verify APK exists
        run: |
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "✅ APK built successfully"
            ls -lh build/app/outputs/flutter-apk/app-release.apk
          else
            echo "❌ APK not found"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gemstone-app-pat-verified
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  verify-apk:
    runs-on: ubuntu-latest
    name: Verify APK
    needs: build-release-apk
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: gemstone-app-pat-verified
      
      - name: Verify APK integrity
        run: |
          if [ -f app-release.apk ]; then
            echo "✅ APK verified successfully"
            ls -lh app-release.apk
            file app-release.apk
          else
            echo "❌ APK not found"
            exit 1
          fi

  summary:
    runs-on: ubuntu-latest
    name: PAT Summary
    needs: [build-release-apk, verify-apk]
    if: always()
    steps:
      - name: Print PAT Results
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "PRODUCTION ACCEPTANCE TEST - RESULTS"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "✅ Build Release APK: ${{ needs.build-release-apk.result }}"
          echo "✅ Verify APK: ${{ needs.verify-apk.result }}"
          echo ""
          echo "════════════════════════════════════════════════════════════"
          echo "NEXT STEPS - MANUAL PHONE TESTING REQUIRED"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "1. Download APK from GitHub Actions Artifacts"
          echo "2. Install on Android device: adb install app-release.apk"
          echo ""
          echo "Test Accounts:"
          echo "  - Super Admin: admin / admin123"
          echo "  - Staff A: staff_a / password123 (Dashboard + Sales)"
          echo "  - Staff B: staff_b / password123 (Inventory + Purchase)"
          echo "  - Staff C: staff_c / password123 (Reports only)"
          echo ""
          echo "Verification Checklist:"
          echo "  ✓ App launches without crash"
          echo "  ✓ Login screen appears"
          echo "  ✓ Super Admin sees all tabs"
          echo "  ✓ Staff A sees only Dashboard + Sales"
          echo "  ✓ Staff B sees only Inventory + Purchase"
          echo "  ✓ Staff C sees only Reports"
          echo "  ✓ Unauthorized pages show access denied"
          echo "  ✓ Business logic works (Sales, Inventory, etc.)"
          echo ""
          echo "GitHub Actions Run:"
          echo "  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
