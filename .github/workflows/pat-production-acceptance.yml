name: PAT - Production Acceptance Testing

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*-pat']

jobs:
  build-release-apk:
    runs-on: ubuntu-latest
    name: Build Release APK
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: |
          echo "Starting Flutter APK build..."
          flutter build apk --release
          echo "Build completed with exit code: $?"
      
      - name: List build outputs
        run: |
          echo "Checking for APK in standard location..."
          ls -lah build/app/outputs/flutter-apk/ || echo "Directory not found"
          echo ""
          echo "Searching for APK files..."
          find build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
      
      - name: Verify and upload APK
        run: |
          APK_FILE="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_FILE" ]; then
            echo "✅ APK found: $APK_FILE"
            ls -lh "$APK_FILE"
            file "$APK_FILE"
          else
            echo "❌ APK not found at expected location"
            echo "Searching for APK in entire build directory..."
            find build -name "*.apk" -type f
            exit 1
          fi
      
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gemstone-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  verify-apk:
    runs-on: ubuntu-latest
    name: Verify APK
    needs: build-release-apk
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: gemstone-app-release
      
      - name: Verify APK
        run: |
          if [ -f app-release.apk ]; then
            echo "✅ APK downloaded successfully"
            ls -lh app-release.apk
            file app-release.apk
          else
            echo "❌ APK download failed"
            exit 1
          fi

  summary:
    runs-on: ubuntu-latest
    name: PAT Summary
    needs: [build-release-apk, verify-apk]
    if: always()
    steps:
      - name: Report Results
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "PRODUCTION ACCEPTANCE TEST RESULTS"
          echo "════════════════════════════════════════════════════════════"
          echo ""
          echo "Build Release APK: ${{ needs.build-release-apk.result }}"
          echo "Verify APK: ${{ needs.verify-apk.result }}"
          echo ""
          if [ "${{ needs.build-release-apk.result }}" = "success" ] && [ "${{ needs.verify-apk.result }}" = "success" ]; then
            echo "✅ ALL TESTS PASSED - APK is ready for testing"
            exit 0
          else
            echo "❌ TESTS FAILED"
            exit 1
          fi
