name: Runtime Debug (Emulator Logcat)

on:
  workflow_dispatch:

jobs:
  runtime-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_HOME" >> android/local.properties

      - run: flutter pub get

      - name: Build debug APK (better stack traces)
        run: flutter build apk --debug

      - name: Run app on emulator and capture logcat
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb logcat -c || true
            adb install -r build/app/outputs/flutter-apk/app-debug.apk
            adb shell am start -n com.gemstone.management/.MainActivity
            sleep 25
            echo "================ FULL LOGCAT (filtered) ================"
            adb logcat -d > full_logcat.txt || true
            echo "================ FLUTTER / CRASH LINES ================"
            adb logcat -d | grep -iE "flutter|AndroidRuntime|FATAL|Exception|HiveError|gemstone|E/|crash" | head -300 || true
            echo "================ ACTIVITY STATE ================"
            adb shell dumpsys activity activities | grep -iE "mResumedActivity|gemstone" | head -20 || true

      - name: Upload full logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-logcat
          path: full_logcat.txt
          retention-days: 7
