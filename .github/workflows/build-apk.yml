name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      # Step 3: Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      # Step 4: Get Flutter dependencies
      - name: Get Flutter dependencies
        run: flutter pub get
      
      # Step 5: Run Flutter analysis
      - name: Run Flutter analysis
        run: flutter analyze
        continue-on-error: true
      
      # Step 6: Run Flutter tests
      - name: Run Flutter tests
        run: flutter test
        continue-on-error: true
      
      # Step 7: Build release APK only
      - name: Build release APK
        run: flutter build apk --release
      
      # Step 8: Upload release APK as artifact
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: gemstone-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      
      # Step 9: Create GitHub Release (on tag push)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            # Gemstone Management App - Release ${{ github.ref_name }}
            
            ## Installation Instructions
            1. Download the APK file (gemstone-app-release.apk)
            2. Enable "Unknown Sources" in Android Settings
            3. Install the APK on your Android device
            
            ## Features
            - Offline-first SQLite database
            - Full inventory management
            - Sales and expense tracking
            - Worker management
            - Profit/Loss reports
            - QR code tracking
            - Myanmar language support
            
            ## Version Info
            - Version: ${{ github.ref_name }}
            - Build Date: ${{ github.event.head_commit.timestamp }}
            
            ## Offline Mode
            The app works completely offline with SQLite. All data is stored locally and can be synced to the backend when internet is available.
            
            ## Login Credentials (Testing)
            - Email: admin@example.com
            - Password: password123
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Step 10: Build success message
      - name: Build Success
        if: success()
        run: |
          echo "✅ APK built successfully!"
          echo "📦 Release APK: build/app/outputs/flutter-apk/app-release.apk"
          echo "📥 Download from GitHub Actions Artifacts or GitHub Releases"
