name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: ./frontend
        run: flutter pub get

      - name: Clean Flutter
        working-directory: ./frontend
        run: flutter clean

      - name: Regenerate Android Project
        working-directory: ./frontend
        run: |
          rm -rf android/
          flutter create . --platforms android
          # Enable Android Embedding v2 and AndroidX
          if [ -f android/gradle.properties ]; then
            echo "android.useAndroidX=true" >> android/gradle.properties
            echo "android.enableJetifier=true" >> android/gradle.properties
          fi

      - name: Run Flutter tests
        working-directory: ./frontend
        run: flutter test --no-pub
        continue-on-error: true

      - name: Build Runner (Generate code)
        working-directory: ./frontend
        run: flutter pub run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Build APK
        working-directory: ./frontend
        run: flutter build apk --release --no-pub

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release Notes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "## Gemstone Management App - Android Release" > release_notes.txt
          echo "" >> release_notes.txt
          echo "**Build Number:** ${{ github.run_number }}" >> release_notes.txt
          echo "**Commit:** ${{ github.sha }}" >> release_notes.txt
          echo "**Branch:** main" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "### Download APK" >> release_notes.txt
          echo "The APK file is available in the artifacts section." >> release_notes.txt
          echo "" >> release_notes.txt
          echo "### Installation Instructions" >> release_notes.txt
          echo "1. Download the app-release.apk file from artifacts" >> release_notes.txt
          echo "2. Transfer to your Android device" >> release_notes.txt
          echo "3. Enable 'Unknown Sources' in Settings > Security" >> release_notes.txt
          echo "4. Open the APK file and tap Install" >> release_notes.txt
          echo "5. Launch the app and login with your credentials" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "### Features" >> release_notes.txt
          echo "- ✅ Gemstone Inventory Management" >> release_notes.txt
          echo "- ✅ Sales & Expense Tracking" >> release_notes.txt
          echo "- ✅ Worker Management" >> release_notes.txt
          echo "- ✅ Branch Operations" >> release_notes.txt
          echo "- ✅ Offline-first Architecture" >> release_notes.txt
          echo "- ✅ Real-time Synchronization" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "### System Requirements" >> release_notes.txt
          echo "- Android 5.0 (API 21) or higher" >> release_notes.txt
          echo "- Minimum 100MB free storage" >> release_notes.txt
          echo "- Internet connection for sync" >> release_notes.txt

      - name: Notify Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ APK build completed successfully!"
            echo "📦 APK file: gemstone-app-v${{ github.run_number }}.apk"
          else
            echo "❌ APK build failed. Check logs for details."
          fi
