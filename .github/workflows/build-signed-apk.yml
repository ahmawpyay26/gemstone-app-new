name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      
      # Step 3: Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      # Step 4: Get Flutter dependencies
      - name: Get Flutter dependencies
        run: flutter pub get
      
      # Step 5: Build release APK (unsigned)
      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi
      
      # Step 6: Upload APK artifacts
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: gemstone-app-release-${{ github.event.inputs.version }}
          path: build/app/outputs/flutter-apk/
          retention-days: 30
      
      # Step 7: Create release notes
      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # Gemstone Management App v${{ github.event.inputs.version }}
          
          ## Release Information
          - **Version**: ${{ github.event.inputs.version }}
          - **Build Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - **Commit**: ${{ github.sha }}
          
          ## Latest Features
          - ✅ Sales Records Delete (Soft Delete)
          - ✅ Purchase Records Delete (Admin-only)
          - ✅ Restore Deleted Sales
          - ✅ Per-Item Remaining Quantity Display
          - ✅ Admin-only Delete Permission
          - ✅ Audit Log System
          - ✅ Offline-first SQLite database
          - ✅ Full inventory management
          - ✅ Sales and expense tracking
          - ✅ Worker management
          - ✅ Profit/Loss reports
          - ✅ Notifications system
          
          ## Installation
          1. Download `app-arm64-v8a-release.apk`
          2. Enable "Unknown Sources" in Android settings
          3. Install the APK on your Android device
          4. Launch the app
          
          ## System Requirements
          - Android 5.0 (API 21) or higher
          - Minimum 50MB free storage
          - Internet connection (optional, for sync only)
          
          ## Support
          For issues or feature requests, please contact support@gemstone-app.com
          EOF
          cat release-notes.md
      
      # Step 8: Upload release notes
      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ github.event.inputs.version }}
          path: release-notes.md
          retention-days: 30
