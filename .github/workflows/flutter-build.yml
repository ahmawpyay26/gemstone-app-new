name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: dart analyze > dart_analyze.txt 2>&1 || true

      - name: Run flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings > flutter_analyze.txt 2>&1 || true

      - name: Build APK (Verbose)
        run: flutter build apk --release --no-shrink --verbose > build_log.txt 2>&1 || true

      - name: Upload dart analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-output
          path: dart_analyze.txt
          retention-days: 7

      - name: Upload flutter analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-output
          path: flutter_analyze.txt
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Check build result
        run: |
          if [ -f build_log.txt ]; then
            if grep -q "BUILD SUCCESSFUL\|✓ Built" build_log.txt; then
              echo "Build succeeded!"
            else
              echo "Build failed. Check build-log artifact for details."
              echo "=== LAST 50 LINES OF BUILD LOG ==="
              tail -50 build_log.txt
              echo "=== DART ANALYZE OUTPUT ==="
              cat dart_analyze.txt
              exit 1
            fi
          else
            echo "No build log found"
            exit 1
          fi

      - name: Locate APK
        id: apk_path
        run: |
          APK_PATH=$(find build -name "app-release.apk" -o -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            find build -type f -name "*.apk"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      - name: Calculate APK SHA-256
        run: |
          APK_PATH="${{ steps.apk_path.outputs.apk_path }}"
          sha256sum "$APK_PATH" > apk-sha256.txt
          cat apk-sha256.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.apk_path.outputs.apk_path }}
          retention-days: 30

      - name: Upload SHA-256
        uses: actions/upload-artifact@v4
        with:
          name: apk-sha256
          path: apk-sha256.txt
          retention-days: 30

      - name: Comment PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Flutter build succeeded!\n\nAPK artifact available in Actions.'
            })
