name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: |
          dart analyze > dart_analyze.txt 2>&1 || true
          cat dart_analyze.txt

      - name: Build APK (Release)
        run: |
          set +e
          echo "=== BUILD START $(date -u) ===" | tee build_log.txt
          echo "=== pwd ===" | tee -a build_log.txt
          pwd | tee -a build_log.txt
          echo "" | tee -a build_log.txt
          echo "=== flutter build apk --release --no-shrink ===" | tee -a build_log.txt
          flutter build apk --release --no-shrink 2>&1 | tee -a build_log.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          echo "" | tee -a build_log.txt
          echo "=== BUILD EXIT CODE: $BUILD_EXIT ===" | tee -a build_log.txt
          echo "=== BUILD END $(date -u) ===" | tee -a build_log.txt
          echo "" | tee -a build_log.txt
          echo "=== build_log.txt size: $(wc -c < build_log.txt) bytes ===" | tee -a build_log.txt
          echo "=== build_log.txt lines: $(wc -l < build_log.txt) ===" | tee -a build_log.txt
          echo "" | tee -a build_log.txt
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "=== FAILURE DETECTED - Capturing additional diagnostics ===" | tee -a build_log.txt
            echo "" | tee -a build_log.txt
            echo "=== find . -name '*.apk' ===" | tee -a build_log.txt
            find . -name "*.apk" 2>&1 | tee -a build_log.txt
            echo "" | tee -a build_log.txt
            echo "=== ls -R build/app 2>&1 || true ===" | tee -a build_log.txt
            ls -R build/app 2>&1 | tee -a build_log.txt || true
            echo "" | tee -a build_log.txt
            echo "::error::Flutter build failed with exit code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi

      - name: Upload dart analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-output
          path: dart_analyze.txt
          retention-days: 7

      - name: Verify build log is not empty
        if: always()
        run: |
          echo "=== build_log.txt verification ==="
          if [ ! -f build_log.txt ]; then
            echo "ERROR: build_log.txt does not exist"
            echo "build_log.txt was not created" > build_log.txt
          fi
          FILE_SIZE=$(wc -c < build_log.txt)
          FILE_LINES=$(wc -l < build_log.txt)
          echo "File size: $FILE_SIZE bytes"
          echo "File lines: $FILE_LINES"
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "WARNING: build_log.txt is suspiciously small ($FILE_SIZE bytes)"
            echo "--- Contents ---"
            cat build_log.txt
            echo "--- End ---"
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Verify APK was built
        run: |
          echo "=== pwd before APK verification ==="
          pwd
          echo "=== ls -R build/app/outputs || true ==="
          ls -R build/app/outputs || true
          echo "=== find . -name '*.apk' ==="
          find . -name "*.apk"
          APK=$(find build/app/outputs -type f -name "*.apk" | tail -n 1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found in build/app/outputs"
            echo "Complete build directory tree:"
            find build -type f 2>/dev/null || echo "No build directory"
            exit 1
          fi
          echo "APK found: $APK"
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error
