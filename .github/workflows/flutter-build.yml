name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: |
          dart analyze 2>&1 | tee dart_analyze.txt
          # Emit errors as GitHub annotations
          grep -n "error •" dart_analyze.txt | while IFS= read -r line; do
            echo "::error::$line"
          done

      - name: Build APK (Release)
        run: |
          flutter build apk --release --no-shrink 2>&1 | tee build_log.txt
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Flutter build failed. Errors from build log:"
            grep -i "error\|Error" build_log.txt | head -10 | while IFS= read -r line; do
              echo "::error::$line"
            done
            # Also print last 20 lines for context
            echo "--- Last 20 lines of build_log.txt ---"
            tail -20 build_log.txt
            exit $BUILD_EXIT
          fi

      - name: Upload dart analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-output
          path: dart_analyze.txt
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Locate APK
        id: apk_path
        run: |
          echo "=== DEBUG: Current working directory ==="
          pwd
          
          echo ""
          echo "=== DEBUG: Listing build directory recursively ==="
          ls -R build 2>/dev/null || echo "No build directory found"
          
          echo ""
          echo "=== DEBUG: Find all APK files from current directory ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK files found"
          
          echo ""
          echo "=== DEBUG: Find all files in build directory ==="
          find build -type f 2>/dev/null || echo "No files in build directory"
          
          echo ""
          echo "=== Attempting to locate APK ==="
          APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
          
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            echo "Printing complete directory tree for analysis:"
            find . -type f | grep -E "(build|apk|flutter)" | head -100
            echo ""
            echo "Flutter build command may not have completed successfully."
            echo "Please check the 'Build APK (Release)' step output above."
          else
            echo "Found APK at: $APK_PATH"
            ls -lh "$APK_PATH"
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK artifact
        if: steps.apk_path.outputs.apk_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.apk_path.outputs.apk_path }}
          retention-days: 30
