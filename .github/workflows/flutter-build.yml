name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Run Flutter Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK (Release)
        run: flutter build apk --release --no-shrink

      - name: Calculate APK SHA-256
        run: |
          sha256sum build/app/outputs/flutter-app.apk > apk-sha256.txt
          cat apk-sha256.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-app.apk
          retention-days: 30

      - name: Upload SHA-256
        uses: actions/upload-artifact@v4
        with:
          name: apk-sha256
          path: apk-sha256.txt
          retention-days: 30

      - name: Comment PR with build status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Flutter build succeeded!\n\nAPK artifact available in Actions.'
            })
