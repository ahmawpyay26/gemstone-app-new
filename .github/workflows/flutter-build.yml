name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart analyze and capture errors
        run: |
          dart analyze 2>&1 | tee dart_analyze.txt
          echo "---DART ANALYZE OUTPUT---"
          cat dart_analyze.txt
          echo "---END DART ANALYZE---"

      - name: Print first errors from dart analyze
        if: always()
        run: |
          echo "## Dart Analyze Errors" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -i "error\|Error" dart_analyze.txt | head -20 >> $GITHUB_STEP_SUMMARY || echo "No errors found in dart analyze" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Full Dart Analyze Output (first 50 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -50 dart_analyze.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build APK (Release)
        run: |
          flutter build apk --release --no-shrink 2>&1 | tee build_log.txt || true
          echo "## Build Log (last 30 lines)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 build_log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload dart analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-output
          path: dart_analyze.txt
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Check if build succeeded
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "Build succeeded!"
          else
            echo "BUILD FAILED - check dart_analyze.txt and build_log.txt artifacts"
            echo "First 5 error lines:"
            grep -i "error" dart_analyze.txt | head -5
            exit 1
          fi

      - name: Locate APK
        id: apk_path
        run: |
          APK_PATH=$(find build -name "app-release.apk" -o -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            find build -type f -name "*.apk"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.apk_path.outputs.apk_path }}
          retention-days: 30
