name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: |
          dart analyze > dart_analyze.txt 2>&1 || true
          cat dart_analyze.txt

      - name: Build APK (Release)
        run: |
          echo "=== pwd before flutter build ==="
          pwd
          flutter build apk --release --no-shrink > build_log.txt 2>&1
          BUILD_EXIT=$?
          cat build_log.txt
          echo "=== pwd after flutter build ==="
          pwd
          echo "=== ls -R build || true ==="
          ls -R build || true
          echo "=== find . -name '*.apk' ==="
          find . -name "*.apk"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Flutter build failed with exit code $BUILD_EXIT"
            exit $BUILD_EXIT
          fi

      - name: Upload dart analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-output
          path: dart_analyze.txt
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Verify APK was built
        run: |
          echo "=== pwd before APK verification ==="
          pwd
          echo "=== ls -R build/app/outputs || true ==="
          ls -R build/app/outputs || true
          echo "=== find . -name '*.apk' ==="
          find . -name "*.apk"
          APK=$(find build/app/outputs -type f -name "*.apk" | tail -n 1)
          if [ -z "$APK" ]; then
            echo "::error::APK not found in build/app/outputs"
            echo "Complete build directory tree:"
            find build -type f 2>/dev/null || echo "No build directory"
            exit 1
          fi
          echo "APK found: $APK"
          ls -lh "$APK"
          echo "APK_PATH=$APK" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30
          if-no-files-found: error
