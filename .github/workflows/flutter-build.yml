name: Flutter Build & Analyze

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter version
        run: flutter --version

      - name: Clean
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Run dart analyze
        run: |
          dart analyze 2>&1 | tee dart_analyze.txt
          # Emit errors as GitHub annotations
          grep -n "error •" dart_analyze.txt | while IFS= read -r line; do
            echo "::error::$line"
          done

      - name: Build APK (Release)
        run: |
          flutter build apk --release --no-shrink 2>&1 | tee build_log.txt
          BUILD_EXIT=$?
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "::error::Flutter build failed. Errors from build log:"
            grep -i "error\|Error" build_log.txt | head -10 | while IFS= read -r line; do
              echo "::error::$line"
            done
            # Also print last 20 lines for context
            echo "--- Last 20 lines of build_log.txt ---"
            tail -20 build_log.txt
            exit $BUILD_EXIT
          fi

      - name: Upload dart analyze output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-output
          path: dart_analyze.txt
          retention-days: 7

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Locate APK
        id: apk_path
        run: |
          APK_PATH=$(find build -name "app-release.apk" -o -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            find build -type f -name "*.apk"
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.apk_path.outputs.apk_path }}
          retention-days: 30
