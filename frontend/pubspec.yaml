name: gemstone_management
description: Professional Gemstone Trading and Processing Management Mobile Application - Offline First

publish_to: 'none'

version: 1.1.0+72

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.7
  
  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  
  
  # Local Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  drift: ^2.13.0
  sqlite3_flutter_libs: ^0.5.18
  
  # Authentication & Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.0
  
  # Dependency Injection
  get_it: ^7.6.0
  
  # File System
  path_provider: ^2.1.0
  
  # Value Equality
  equatable: ^2.0.5
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  
  # HTTP Client
  dio: ^5.3.1
  
  # JSON Serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  drift_dev: ^2.13.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
