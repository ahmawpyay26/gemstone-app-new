services:
  - type: web
    name: gemstone-backend
    env: node
    plan: free
    region: singapore
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        fromDatabase:
          name: gemstone-postgres
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gemstone-postgres
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gemstone-postgres
          property: database
      - key: DB_USER
        fromDatabase:
          name: gemstone-postgres
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gemstone-postgres
          property: password
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "https://gemdash-ggyfjknd.manus.space,http://localhost:3000,http://localhost:5173"

databases:
  - name: gemstone-postgres
    databaseName: gemstone_production
    user: gemstone_user
    plan: free
    region: singapore
    postgresMajorVersion: "15"
