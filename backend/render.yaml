services:
  - type: web
    name: gemstone-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        fromDatabase:
          name: gemstone-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gemstone-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gemstone-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: gemstone-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gemstone-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: gemstone-db
    engine: postgresql
    plan: free
    version: "15"
